# Model roster — Hermes Multi-Agent Orchestrator
# OpenCode Zen — Free Tier (opencode CLI model IDs)

models:
  architect:
    picker_name: "Big Pickle Med"
    api_model: "opencode/big-pickle"
    default_role: "architect"
    strengths: "architecture, creativity, meta-planning"

  planner:
    picker_name: "Deepseek V4 Flash"
    api_model: "opencode/deepseek-v4-flash-free"
    default_role: "planner, researcher, arbiter"
    strengths: "speed, balanced, reliable"

  coder:
    picker_name: "North Mini Code"
    api_model: "opencode/north-mini-code-free"
    default_role: "coder"
    strengths: "code, technical tasks"

  synthesizer:
    picker_name: "Mimo V2.5"
    api_model: "opencode/mimo-v2.5-free"
    default_role: "synthesizer"
    strengths: "creativity, generation, text"

  reviewer:
    picker_name: "Nemotron 3 Ultra"
    api_model: "opencode/nemotron-3-ultra-free"
    default_role: "reviewer"
    strengths: "deep analysis, reasoning"

modes:
  council:
    description: "All agents in parallel → Arbiter synthesizes"
    when: "research, comparison, multi-perspective"

  pipeline:
    description: "Sequential stages A → B → C → D"
    when: "code review, document writing, translation"

  hybrid:
    description: "Parallel first round, sequential second"
    when: "complex mixed tasks (research + code)"
